<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wavelength Recorder (dev tool)</title>
<style>
  /* Dev capture tool, not the product UI (that's Peter's). Kept deliberately plain. */
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.2rem; }
  button { font-size: 1rem; padding: .5rem 1rem; margin-right: .5rem; cursor: pointer; }
  #speaker { font-weight: bold; }
  .me { color: #0a6; } .them { color: #06a; }
  #log { border: 1px solid #ccc; padding: .75rem; min-height: 10rem; margin-top: 1rem; white-space: pre-wrap; }
  .hint { color: #666; font-size: .85rem; }
  textarea { width: 100%; height: 10rem; margin-top: 1rem; font-family: monospace; }
</style>
</head>
<body>
<h1>Wavelength Recorder <span class="hint">(dev capture tool — Chrome only)</span></h1>
<p class="hint">
  Live speech-to-text via the browser's Web Speech API. Toggle who's speaking with the button or
  the <b>S</b> key (crude manual diarization — fine for demo capture). Export produces the exact
  transcript JSON the brain expects (SPEC.md input contract).
</p>
<button id="start">Start</button>
<button id="stop" disabled>Stop</button>
<button id="toggle">Speaker: <span id="speaker" class="me">ME (S1)</span></button>
<button id="export">Export JSON</button>
<button id="send">Send to /api/debrief</button>
<div id="log"></div>
<textarea id="out" placeholder="exported transcript JSON appears here"></textarea>

<script>
(function () {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { document.getElementById("log").textContent = "Web Speech API not available — use Chrome."; }

  let turns = [];
  let t0 = null;
  let speaker = "S1"; // S1 = the user ("me")
  let rec = null;

  const fmt = (s) => String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(Math.floor(s % 60)).padStart(2, "0");
  const now = () => (Date.now() - t0) / 1000;
  const log = document.getElementById("log");
  const speakerEl = document.getElementById("speaker");

  function addTurn(text) {
    if (!text.trim()) return;
    const turn = { speaker, t: fmt(now()), text: text.trim() };
    turns.push(turn);
    log.textContent += `${turn.t} [${turn.speaker}] ${turn.text}\n`;
  }

  function setSpeaker(s) {
    speaker = s;
    speakerEl.textContent = s === "S1" ? "ME (S1)" : "THEM (S2)";
    speakerEl.className = s === "S1" ? "me" : "them";
  }

  document.getElementById("toggle").onclick = () => setSpeaker(speaker === "S1" ? "S2" : "S1");
  document.addEventListener("keydown", (e) => {
    if (e.key.toLowerCase() === "s" && document.activeElement.tagName !== "TEXTAREA")
      setSpeaker(speaker === "S1" ? "S2" : "S1");
  });

  document.getElementById("start").onclick = () => {
    turns = []; t0 = Date.now(); log.textContent = "";
    rec = new SR();
    rec.continuous = true;
    rec.interimResults = false;
    rec.lang = "en-US";
    rec.onresult = (e) => {
      for (let i = e.resultIndex; i < e.results.length; i++)
        if (e.results[i].isFinal) addTurn(e.results[i][0].transcript);
    };
    rec.onerror = (e) => { log.textContent += `\n[speech error: ${e.error}]\n`; };
    rec.onend = () => { if (t0 && document.getElementById("stop").disabled === false) rec.start(); }; // auto-restart (Chrome times out)
    rec.start();
    document.getElementById("start").disabled = true;
    document.getElementById("stop").disabled = false;
  };

  document.getElementById("stop").onclick = () => {
    document.getElementById("stop").disabled = true;
    document.getElementById("start").disabled = false;
    if (rec) rec.stop();
  };

  function transcriptJson() {
    return {
      conversation_id: "recorded-" + new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-"),
      user_speaker: "S1",
      turns,
    };
  }

  document.getElementById("export").onclick = () => {
    document.getElementById("out").value = JSON.stringify(transcriptJson(), null, 2);
  };

  document.getElementById("send").onclick = async () => {
    const base = prompt("Server base URL", "https://wavelength-brain-37j5z.ondigitalocean.app");
    if (!base) return;
    const r = await fetch(base.replace(/\/$/, "") + "/api/debrief", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(transcriptJson()),
    });
    document.getElementById("out").value = JSON.stringify(await r.json(), null, 2);
  };
})();
</script>
</body>
</html>
